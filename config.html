<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVP.OS | Configurações do Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .config-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; }
        input, textarea { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <a href="index.html" class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-2 block">← Voltar ao Dashboard</a>
                <h1 class="text-4xl font-[900] tracking-tighter">CONFIGURAÇÕES <span class="text-indigo-500 text-lg uppercase italic">v1.0</span></h1>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="config-card p-10 space-y-6">
                <h2 class="text-xs font-black text-indigo-400 uppercase tracking-widest border-b border-white/5 pb-4">Identidade do Operador</h2>

                <div class="flex flex-col items-center mb-6">
                    <img id="preview-avatar" src="https://ui-avatars.com/api/?name=User" class="w-32 h-32 rounded-[40px] border-4 border-indigo-500/20 mb-4 object-cover">
                    <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="previewImage(event)">
                    <button onclick="document.getElementById('avatar-input').click()" class="text-[10px] font-black bg-indigo-600 px-4 py-2 rounded-lg uppercase">Alterar Foto</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-2">Nome do Usuário</label>
                        <input type="text" id="conf-name" class="w-full p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all font-bold">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-2">Frase de Impacto (Mantra)</label>
                        <input type="text" id="conf-mantra" class="w-full p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all font-bold">
                    </div>
                </div>
            </section>

            <section class="config-card p-10 flex flex-col justify-between">
                <div>
                    <h2 class="text-xs font-black text-indigo-400 uppercase tracking-widest border-b border-white/5 pb-4 mb-8">Status da Memória Local</h2>
                    <div class="space-y-6">
                        <div class="flex justify-between items-end">
                            <span class="text-slate-400 text-xs font-bold uppercase">Banco de Dados</span>
                            <span id="storage-use" class="text-2xl font-black text-indigo-500">0 KB</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2">
                            <div id="storage-bar" class="bg-indigo-500 h-2 rounded-full" style="width: 2%"></div>
                        </div>
                        <p class="text-[9px] text-slate-500 leading-relaxed italic">
                            O GVP.OS utiliza o armazenamento local do seu navegador. Recomenda-se realizar um Master Backup semanalmente para garantir a integridade dos dados.
                        </p>
                    </div>
                </div>

                <div class="space-y-3">
                    <button onclick="saveProfile()" class="w-full py-5 bg-indigo-600 text-white rounded-[25px] font-black uppercase tracking-widest text-xs hover:bg-indigo-500 transition-all shadow-xl shadow-indigo-500/20">
                        Salvar Alterações
                    </button>
                    <button onclick="factoryReset()" class="w-full py-4 text-rose-500 font-black uppercase tracking-widest text-[9px] hover:bg-rose-500/10 rounded-2xl transition-all">
                        Reset de Fábrica (Apagar Tudo)
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script>
        let base64Avatar = "";

        document.addEventListener('DOMContentLoaded', () => {
            const profile = JSON.parse(localStorage.getItem('gtitan_profile')) || {};
            document.getElementById('conf-name').value = profile.name || "";
            document.getElementById('conf-mantra').value = profile.mantra || "";
            if (profile.avatar) {
                document.getElementById('preview-avatar').src = profile.avatar;
                base64Avatar = profile.avatar;
            }
            calculateStorage();
        });

        function previewImage(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Avatar = e.target.result;
                document.getElementById('preview-avatar').src = base64Avatar;
            };
            reader.readAsDataURL(file);
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('conf-name').value,
                mantra: document.getElementById('conf-mantra').value,
                avatar: base64Avatar
            };
            localStorage.setItem('gtitan_profile', JSON.stringify(profile));
            alert("Sistema Sincronizado. Perfil Atualizado!");
            window.location.href = 'index.html';
        }

        function calculateStorage() {
            let total = 0;
            for (let x in localStorage) {
                if (localStorage.hasOwnProperty(x)) {
                    total += ((localStorage[x].length + x.length) * 2);
                }
            }
            const kb = (total / 1024).toFixed(2);
            document.getElementById('storage-use').innerText = `${kb} KB`;
            document.getElementById('storage-bar').style.width = `${Math.min(100, (kb/5120)*100)}%`; // LocalStorage costuma ser 5MB
        }

        function factoryReset() {
            if (confirm("ATENÇÃO: Isso apagará todas as tarefas, finanças, notas e configurações permanentemente. Continuar?")) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
