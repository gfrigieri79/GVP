<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVP.OS | Memória Titan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        #calendarNotes {
            background: #0f172a; color: white; border-radius: 32px; padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        #calendarNotes .fc-toolbar-title { font-size: 1.1rem; font-weight: 800; color: white; }
        #calendarNotes .fc-daygrid-day-number { color: #64748b; font-weight: bold; }
        #calendarNotes .fc-col-header-cell-cushion { color: #818cf8; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; }

        .note-card { transition: all 0.3s ease; border-left: 4px solid transparent; cursor: pointer !important; }
        .note-card:hover { transform: translateX(8px); border-left-color: #6366f1; background: #f8fafc; }
        .modal-blur { backdrop-filter: blur(12px); background-color: rgba(15, 23, 42, 0.8); z-index: 100; }

        .sync-active { color: #10b981 !important; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1800px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 bg-white p-8 rounded-[40px] shadow-sm border border-slate-200">
            <div>
                <a href="index.html" class="text-slate-400 hover:text-indigo-600 font-bold text-xs uppercase tracking-widest mb-2 block">← Voltar ao Hub</a>
                <h1 class="text-4xl font-[900] text-indigo-950 tracking-tighter leading-none">Memória <span class="text-indigo-600">& Atas Titan</span></h1>
            </div>
            <button type="button" onclick="openNoteModal()" class="px-8 py-4 bg-indigo-600 text-white rounded-[25px] font-black shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95 uppercase tracking-widest text-xs mt-4 lg:mt-0">
                + Nova Ata
            </button>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-7 space-y-4">
                <section class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-200 min-h-[70vh]">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] italic">Arquivo de Insights</h2>
                        <span id="notes-count" class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">0 Registros</span>
                    </div>
                    <div id="notes-list" class="space-y-4">
                        </div>
                </section>
            </div>

            <div class="xl:col-span-5">
                <div class="sticky top-8 space-y-8">
                    <div id="calendarNotes"></div>
                    <div class="bg-slate-900 p-8 rounded-[40px] text-white shadow-2xl">
                        <h3 class="font-black uppercase tracking-widest text-indigo-400 text-xs mb-4">Comando /T</h3>
                        <p class="text-xs text-slate-300 leading-relaxed italic">
                            "Escreva /T tarefa e aperte ENTER para salvar uma ação no banco de dados enquanto digita."
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="noteModal" class="fixed inset-0 hidden items-center justify-center modal-blur p-4">
        <div class="bg-white p-10 rounded-[50px] w-full max-w-4xl shadow-2xl border-b-[15px] border-indigo-950 max-h-[95vh] overflow-y-auto custom-scroll" onclick="event.stopPropagation()">
            <h3 id="noteModalTitle" class="text-3xl font-black mb-8 text-slate-900 tracking-tighter uppercase text-center">Ata de Sessão</h3>
            <input type="hidden" id="noteId">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Pauta</label>
                    <input type="text" id="noteTitle" placeholder="Título" class="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Data</label>
                    <input type="date" id="noteDate" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                </div>
            </div>

            <div class="mb-6">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Vínculo Estratégico</label>
                <input list="tasks-datalist" id="noteTaskParent" placeholder="Pesquisar projeto..." class="w-full p-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl font-bold outline-none">
                <datalist id="tasks-datalist"></datalist>
            </div>

            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Conteúdo</label>
                    <span id="sync-status" class="text-[9px] font-black text-slate-300 uppercase tracking-widest transition-all">● Motor /T Ativo</span>
                </div>
                <textarea id="noteContent" rows="12"
                    onkeydown="handleTitanCommand(event, this)"
                    placeholder="Inicie sua ata..."
                    class="w-full p-6 bg-slate-50 border border-slate-100 rounded-[35px] outline-none font-medium leading-relaxed text-slate-700 focus:bg-white transition-all custom-scroll"></textarea>
            </div>

            <div class="flex flex-wrap gap-4 pt-6 border-t border-slate-100">
                <button type="button" onclick="closeNoteModal()" class="px-8 py-5 font-black text-slate-400 uppercase text-[10px] tracking-widest hover:text-slate-600 transition-all">Cancelar</button>
                <button type="button" id="delNoteBtn" onclick="deleteNoteFromModal()" class="hidden text-rose-500 font-black px-8 hover:bg-rose-50 rounded-2xl text-[10px] uppercase">Excluir</button>
                <div class="flex-1"></div>
                <button type="button" onclick="saveNote()" class="px-12 py-5 bg-indigo-950 text-white rounded-[25px] font-black shadow-2xl hover:bg-black transition-all text-[12px] uppercase tracking-widest">Gravar Ata</button>
            </div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('gtitan_notes')) || [];
        let calendarNotes;

        document.addEventListener('DOMContentLoaded', () => {
            const calEl = document.getElementById('calendarNotes');
            calendarNotes = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                height: 'auto',
                eventClick: function(info) {
                    openNoteModal(info.event.id);
                }
            });
            calendarNotes.render();
            renderNotes();
            populateDatalist();
        });

        function populateDatalist() {
            const datalist = document.getElementById('tasks-datalist');
            const allTasks = JSON.parse(localStorage.getItem('gtitan_tasks')) || [];
            let options = [];
            const extract = (list) => {
                list.forEach(t => { options.push(t.title); if (t.children) extract(t.children); });
            };
            extract(allTasks);
            datalist.innerHTML = options.map(opt => `<option value="${opt}">`).join('');
        }

        // COMANDO /T
        function handleTitanCommand(event, el) {
            if (event.key === 'Enter') {
                const cursorPos = el.selectionStart;
                const textBeforeCursor = el.value.substring(0, cursorPos);
                const lines = textBeforeCursor.split('\n');
                const lastLine = lines[lines.length - 1];

                if (lastLine.trim().startsWith('/T ')) {
                    event.preventDefault();
                    const taskTitle = lastLine.replace('/T ', '').trim();

                    if (taskTitle) {
                        let allTasks = JSON.parse(localStorage.getItem('gtitan_tasks')) || [];
                        allTasks.push({
                            id: Date.now(),
                            title: taskTitle,
                            start: new Date().toISOString().split('T')[0],
                            end: new Date().toISOString().split('T')[0],
                            duration: 60, progress: 0, priority: 'low', importance: 'low', children: []
                        });
                        localStorage.setItem('gtitan_tasks', JSON.stringify(allTasks));

                        const textAfterCursor = el.value.substring(cursorPos);
                        const beforeLine = textBeforeCursor.substring(0, textBeforeCursor.lastIndexOf(lastLine));
                        el.value = beforeLine + `✓ [Tarefa GVP: ${taskTitle}]` + '\n' + textAfterCursor;

                        const status = document.getElementById('sync-status');
                        status.innerText = "● TAREFA SINCRONIZADA!";
                        status.classList.add('sync-active');
                        saveNoteSilent();
                        setTimeout(() => {
                            status.innerText = "● Motor /T Ativo";
                            status.classList.remove('sync-active');
                        }, 2000);
                    }
                }
            }
        }

        function saveNoteSilent() {
            const id = document.getElementById('noteId').value;
            const iso = document.getElementById('noteDate').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('noteTitle').value || "Ata em rascunho",
                parentTask: document.getElementById('noteTaskParent').value || "",
                content: document.getElementById('noteContent').value,
                isoDate: iso,
                date: new Date(iso + 'T12:00:00').toLocaleDateString('pt-br')
            };
            if (!id) document.getElementById('noteId').value = data.id;

            const idx = notes.findIndex(n => n.id == data.id);
            if (idx !== -1) notes[idx] = data;
            else notes.unshift(data);

            localStorage.setItem('gtitan_notes', JSON.stringify(notes));
        }

        // FUNÇÕES DE ABERTURA (CORRIGIDAS)
        window.openNoteModal = function(id = null) {
            const modal = document.getElementById('noteModal');
            document.getElementById('noteId').value = id || "";
            document.getElementById('noteTitle').value = "";
            document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('noteTaskParent').value = "";
            document.getElementById('noteContent').value = "";
            document.getElementById('delNoteBtn').classList.toggle('hidden', !id);

            if (id) {
                const n = notes.find(x => x.id == id);
                if (n) {
                    document.getElementById('noteTitle').value = n.title;
                    document.getElementById('noteDate').value = n.isoDate;
                    document.getElementById('noteTaskParent').value = n.parentTask || "";
                    document.getElementById('noteContent').value = n.content;
                }
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        window.closeNoteModal = function() {
            const modal = document.getElementById('noteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.saveNote = function() {
            saveNoteSilent();
            renderNotes();
            closeNoteModal();
        }

        window.deleteNoteFromModal = function() {
            if(confirm('Apagar nota permanentemente?')) {
                const id = document.getElementById('noteId').value;
                notes = notes.filter(n => n.id != id);
                localStorage.setItem('gtitan_notes', JSON.stringify(notes));
                renderNotes();
                closeNoteModal();
            }
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            document.getElementById('notes-count').innerText = `${notes.length} REGISTROS`;

            list.innerHTML = notes.map(n => `
                <div onclick="openNoteModal(${n.id})" class="note-card bg-white p-6 rounded-[30px] border border-slate-100 shadow-sm animate-fade mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-2 py-1 rounded">${n.date}</span>
                        ${n.parentTask ? `<span class="text-[8px] font-black bg-slate-900 text-white px-2 py-1 rounded uppercase italic">🔗 ${n.parentTask}</span>` : ''}
                    </div>
                    <h4 class="font-black text-lg text-slate-800 tracking-tight">${n.title}</h4>
                    <p class="text-xs text-slate-500 line-clamp-2 mt-1 italic">${n.content.substring(0, 120)}...</p>
                </div>
            `).join('');

            calendarNotes.removeAllEvents();
            notes.forEach(n => calendarNotes.addEvent({ id: n.id, title: n.title, start: n.isoDate, backgroundColor: '#4f46e5' }));
        }
    </script>
</body>
</html>
